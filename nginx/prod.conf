events {}
http {

    # Server Name Indication (SNI) support for SSL/TLS proxying
    proxy_ssl_server_name on;

    # Server Configurations
    server {

        # =========================
        # Main
        # =========================

        location = / {
            return 302 /login/;
        }

        location /static/ {
            proxy_pass https://uninsubria-rvicario-ws-auth.onrender.com;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # =========================
        # Authentication
        # =========================

        location /login {
            proxy_pass https://uninsubria-rvicario-ws-auth.onrender.com;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /auth/api/ {
            proxy_pass https://uninsubria-rvicario-ws-auth.onrender.com;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # =========================
        # Dashboard
        # =========================

        location /dashboard {
            proxy_pass https://uninsubria-rvicario-ws-dashboard.onrender.com;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
