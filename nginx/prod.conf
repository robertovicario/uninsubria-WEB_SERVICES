events {}
http {
    proxy_ssl_server_name on;

    server {

        # Port
        listen 80;

        # =========================
        # Main
        # =========================

        location = / {
            return 303 /login;
        }

        location = /favicon.ico {
            proxy_pass https://uninsubria-web_services-robertovicario-auth.onrender.com/static/img/favicons/favicon.ico;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /static/ {
            proxy_pass https://uninsubria-web_services-robertovicario-auth.onrender.com;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # =========================
        # Authorization
        # =========================

        location /login {
            proxy_pass https://uninsubria-web_services-robertovicario-auth.onrender.com;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /auth/api/ {
            proxy_pass https://uninsubria-web_services-robertovicario-auth.onrender.com;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # =========================
        # Dashboard
        # =========================

        location /dashboard {
            proxy_pass https://uninsubria-web_services-robertovicario-dashboard.onrender.com;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
